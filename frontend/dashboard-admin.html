  <!-- ══════════════════ MAIN ══════════════════ -->

<script src="assets/js/main.js"></script>
<script>

// ══════════════════════════════════════════════
//  HELPERS
// ══════════════════════════════════════════════
function getUserById(id) { return DATA.utilisateurs.find(u => u.id === id); }
function getUserName(id) { const u = getUserById(id); return u ? u.prenom + ' ' + u.nom : '–'; }

function badgeRole(role) {
  const map = { admin:'badge-admin', developpeur:'badge-dev', public:'badge-public' };
  return `<span class="badge ${map[role]||''}">${role}</span>`;
}

function badgeStatut(statut) {
  const map = { active:'badge-active', revoquee:'badge-revoked', en_attente:'badge-pending', payee:'badge-paid', reussi:'badge-active', echoue:'badge-revoked' };
  const labels = { active:'Active', revoquee:'Révoquée', en_attente:'En attente', payee:'Payée', reussi:'Réussi', echoue:'Échoué' };
  return `<span class="badge ${map[statut]||''}">${labels[statut]||statut}</span>`;
}

function masquerCle(cle) { return cle.substring(0, 10) + '••••••••••••••••••'; }

function progressBar(used, max) {
  const pct = Math.min(Math.round((used/max)*100), 100);
  const cls = pct >= 90 ? 'danger' : pct >= 70 ? 'warning' : '';
  return `
    <div style="font-size:11px;color:var(--text-muted)">${used} / ${max} appels (${pct}%)</div>
    <div class="progress-bar"><div class="progress-fill ${cls}" style="width:${pct}%"></div></div>`;
}

// ══════════════════════════════════════════════
//  TOAST
// ══════════════════════════════════════════════
function showToast(msg, type='success') {
  const icons = { success:'ti-circle-check', danger:'ti-alert-circle', warning:'ti-alert-triangle' };
  const tc = document.getElementById('toastContainer');
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  t.innerHTML = `<i class="ti ${icons[type]||'ti-info-circle'}" style="font-size:18px"></i><span>${msg}</span>`;
  tc.appendChild(t);
  setTimeout(() => t.remove(), 3500);
}

// ══════════════════════════════════════════════
//  MODAL
// ══════════════════════════════════════════════
function openModal(html) {
  document.getElementById('modalContent').innerHTML = html;
  document.getElementById('modalOverlay').classList.add('open');
}
function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }
document.getElementById('modalOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

// ══════════════════════════════════════════════
//  NAVIGATION
// ══════════════════════════════════════════════
const sections = {
  overview: { title:'Vue d\'ensemble', subtitle:'Bienvenue sur le panneau d\'administration' },
  users:    { title:'Utilisateurs', subtitle:'Gérer tous les comptes utilisateurs' },
  keys:     { title:'Clés API', subtitle:'Gérer les clés API de la plateforme' },
  logs:     { title:'Logs de consommation', subtitle:'Historique de tous les appels' },
  billing:  { title:'Facturation', subtitle:'Gérer et générer les factures' },
  requests: { title:'Demandes d\'API', subtitle:'Traiter les demandes de nouveaux services' }
};

function navigate(section) {
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.querySelector(`[data-section="${section}"]`).classList.add('active');
  document.getElementById('pageTitle').textContent = sections[section].title;
  document.getElementById('pageSubtitle').textContent = sections[section].subtitle;
  const renders = { overview:renderOverview, users:renderUsers, keys:renderKeys, logs:renderLogs, billing:renderBilling, requests:renderRequests };
  document.getElementById('pageContent').innerHTML = '';
  (renders[section] || renderOverview)();
}

document.querySelectorAll('.nav-item').forEach(item => {
  item.addEventListener('click', e => { e.preventDefault(); navigate(item.dataset.section); });
});

// ══════════════════════════════════════════════
//  SECTION : VUE D'ENSEMBLE
// ══════════════════════════════════════════════
function renderOverview() {
  const totalUsers = DATA.utilisateurs.length;
  const totalKeys  = DATA.cles_api.length;
  const activeKeys = DATA.cles_api.filter(k => k.statut === 'active').length;
  const totalLogs  = DATA.logs.length;
  const totalCA    = DATA.facturation.reduce((s,f) => s + f.montantTotal, 0).toFixed(2);
  const pending    = DATA.demandes.filter(d => d.statut === 'en_attente').length;

  document.getElementById('pageContent').innerHTML = `
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-icon purple"><i class="ti ti-users"></i></div>
        <div class="stat-info">
          <div class="stat-value">${totalUsers}</div>
          <div class="stat-label">Utilisateurs inscrits</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon green"><i class="ti ti-key"></i></div>
        <div class="stat-info">
          <div class="stat-value">${activeKeys}<span style="font-size:14px;color:var(--text-muted)">/${totalKeys}</span></div>
          <div class="stat-label">Clés API actives</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon amber"><i class="ti ti-activity"></i></div>
        <div class="stat-info">
          <div class="stat-value">${totalLogs}</div>
          <div class="stat-label">Appels enregistrés</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon red"><i class="ti ti-receipt"></i></div>
        <div class="stat-info">
          <div class="stat-value">${totalCA}<span style="font-size:13px;color:var(--text-muted)"> €</span></div>
          <div class="stat-label">Chiffre d'affaires</div>
        </div>
      </div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:24px;">

      <!-- Derniers utilisateurs -->
      <div class="card">
        <div class="card-header">
          <div><div class="card-title">Derniers utilisateurs</div></div>
          <button class="btn btn-outline btn-sm" onclick="navigate('users')">Voir tout</button>
        </div>
        <div class="table-wrap">
          <table>
            <thead><tr><th>Nom</th><th>Rôle</th><th>Statut</th></tr></thead>
            <tbody>
              ${DATA.utilisateurs.slice(-4).reverse().map(u => `
                <tr>
                  <td>
                    <div style="display:flex;align-items:center;gap:10px">
                      <div class="avatar" style="width:30px;height:30px;font-size:12px">${u.prenom[0]}</div>
                      <div>
                        <div style="font-weight:600">${u.prenom} ${u.nom}</div>
                        <div style="font-size:11px;color:var(--text-muted)">${u.email}</div>
                      </div>
                    </div>
                  </td>
                  <td>${badgeRole(u.role)}</td>
                  <td>${u.estVerifie ? '<span class="badge badge-active">Vérifié</span>' : '<span class="badge badge-pending">Non vérifié</span>'}</td>
                </tr>`).join('')}
            </tbody>
          </table>
        </div>
      </div>

      <!-- Demandes en attente -->
      <div class="card">
        <div class="card-header">
          <div>
            <div class="card-title">Demandes en attente</div>
            <div class="card-subtitle">${pending} demande(s) à traiter</div>
          </div>
          <button class="btn btn-outline btn-sm" onclick="navigate('requests')">Voir tout</button>
        </div>
        ${DATA.demandes.filter(d=>d.statut==='en_attente').map(d => `
          <div style="background:var(--bg-page);border-radius:var(--radius-sm);padding:14px;margin-bottom:10px;">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
              <div style="font-weight:600">${getUserName(d.utilisateur_id)}</div>
              <span class="badge badge-pending">${d.service}</span>
            </div>
            <p style="font-size:12px;color:var(--text-muted);margin-bottom:10px">${d.justification}</p>
            <div style="display:flex;gap:8px">
              <button class="btn btn-success btn-sm" onclick="traiterDemande(${d.id},'approuver')"><i class="ti ti-check"></i> Approuver</button>
              <button class="btn btn-danger btn-sm"  onclick="traiterDemande(${d.id},'rejeter')"><i class="ti ti-x"></i> Rejeter</button>
            </div>
          </div>`).join('') || '<div class="empty-state"><i class="ti ti-inbox"></i><p>Aucune demande en attente</p></div>'}
      </div>

    </div>`;
}

// ══════════════════════════════════════════════
//  SECTION : UTILISATEURS
// ══════════════════════════════════════════════
function renderUsers() {
  document.getElementById('pageContent').innerHTML = `
    <div class="card">
      <div class="card-header">
        <div class="card-title">Liste des utilisateurs (${DATA.utilisateurs.length})</div>
        <div class="search-bar">
          <i class="ti ti-search"></i>
          <input type="text" placeholder="Rechercher..." id="searchUser" oninput="filterUsers(this.value)"/>
        </div>
      </div>
      <div class="table-wrap">
        <table id="usersTable">
          <thead>
            <tr>
              <th>Utilisateur</th><th>Rôle</th><th>Clés API</th><th>Vérification</th><th>Inscription</th><th>Actions</th>
            </tr>
          </thead>
          <tbody id="usersBody">
            ${renderUsersRows(DATA.utilisateurs)}
          </tbody>
        </table>
      </div>
    </div>`;
}

function renderUsersRows(users) {
  return users.map(u => {
    const userKeys = DATA.cles_api.filter(k => k.utilisateur_id === u.id);
    const activeK  = userKeys.filter(k => k.statut === 'active').length;
    return `
      <tr>
        <td>
          <div style="display:flex;align-items:center;gap:10px">
            <div class="avatar">${u.prenom[0]}</div>
            <div>
              <div style="font-weight:600">${u.prenom} ${u.nom}</div>
              <div style="font-size:11px;color:var(--text-muted)">${u.email}</div>
            </div>
          </div>
        </td>
        <td>${badgeRole(u.role)}</td>
        <td><span style="font-weight:600">${activeK}</span><span style="color:var(--text-muted)">/${userKeys.length}</span> actives</td>
        <td>${u.estVerifie ? '<span class="badge badge-active">Vérifié</span>' : '<span class="badge badge-pending">En attente</span>'}</td>
        <td style="color:var(--text-muted)">${u.dateInscription}</td>
        <td>
          <button class="btn btn-outline btn-sm" onclick="voirDetailsUser(${u.id})"><i class="ti ti-eye"></i> Détails</button>
        </td>
      </tr>`;
  }).join('');
}

function filterUsers(q) {
  const filtered = DATA.utilisateurs.filter(u =>
    (u.nom+u.prenom+u.email).toLowerCase().includes(q.toLowerCase())
  );
  document.getElementById('usersBody').innerHTML = renderUsersRows(filtered);
}

function voirDetailsUser(id) {
  const u    = getUserById(id);
  const keys = DATA.cles_api.filter(k => k.utilisateur_id === id);
  const fact = DATA.facturation.find(f => f.utilisateur_id === id);
  openModal(`
    <div class="modal-header">
      <div class="modal-title">Détails – ${u.prenom} ${u.nom}</div>
      <button class="btn-icon" onclick="closeModal()"><i class="ti ti-x"></i></button>
    </div>
    <div style="display:flex;align-items:center;gap:14px;margin-bottom:20px">
      <div class="avatar" style="width:52px;height:52px;font-size:20px">${u.prenom[0]}</div>
      <div>
        <div style="font-weight:600;font-size:15px">${u.prenom} ${u.nom}</div>
        <div style="color:var(--text-muted);font-size:12px">${u.email}</div>
        <div style="margin-top:4px">${badgeRole(u.role)}</div>
      </div>
    </div>
    <div style="background:var(--bg-page);border-radius:var(--radius-sm);padding:16px;margin-bottom:16px">
      <div style="font-size:12px;color:var(--text-muted);margin-bottom:10px;text-transform:uppercase;letter-spacing:1px">Clés API</div>
      ${keys.length ? keys.map(k => `
        <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border)">
          <div>
            <div style="font-size:12px;font-family:monospace;color:var(--accent)">${masquerCle(k.valeurCle)}</div>
            <div style="font-size:11px;color:var(--text-muted);margin-top:2px">${k.service} · ${k.nombreAppelsUtilises}/${k.quotaMax} appels</div>
            ${progressBar(k.nombreAppelsUtilises, k.quotaMax)}
          </div>
          <div style="margin-left:12px">${badgeStatut(k.statut)}</div>
        </div>`).join('') : '<div style="color:var(--text-muted);font-size:12px">Aucune clé API</div>'}
    </div>
    ${fact ? `
    <div style="background:var(--bg-page);border-radius:var(--radius-sm);padding:16px">
      <div style="font-size:12px;color:var(--text-muted);margin-bottom:8px;text-transform:uppercase;letter-spacing:1px">Facturation du mois</div>
      <div style="display:flex;justify-content:space-between">
        <span style="color:var(--text-muted)">${fact.nombreRequetes} requêtes</span>
        <span style="font-weight:700;font-size:16px">${fact.montantTotal} €</span>
      </div>
      <div style="margin-top:8px">${badgeStatut(fact.statut)}</div>
    </div>` : ''}
  `);
}

// ══════════════════════════════════════════════
//  SECTION : CLÉS API
// ══════════════════════════════════════════════
function renderKeys() {
  document.getElementById('pageContent').innerHTML = `
    <div class="card">
      <div class="card-header">
        <div class="card-title">Toutes les clés API (${DATA.cles_api.length})</div>
        <div style="display:flex;gap:10px">
          <select class="form-control" style="width:auto" onchange="filterKeys(this.value)">
            <option value="">Tous les statuts</option>
            <option value="active">Active</option>
            <option value="revoquee">Révoquée</option>
          </select>
        </div>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr><th>Clé</th><th>Utilisateur</th><th>Service</th><th>Utilisation</th><th>Statut</th><th>Actions</th></tr>
          </thead>
          <tbody id="keysBody">
            ${renderKeysRows(DATA.cles_api)}
          </tbody>
        </table>
      </div>
    </div>`;
}

function renderKeysRows(keys) {
  return keys.map(k => `
    <tr>
      <td style="font-family:monospace;font-size:12px;color:var(--accent)">${masquerCle(k.valeurCle)}</td>
      <td>${getUserName(k.utilisateur_id)}</td>
      <td><span class="badge badge-dev">${k.service}</span></td>
      <td style="min-width:160px">${progressBar(k.nombreAppelsUtilises, k.quotaMax)}</td>
      <td>${badgeStatut(k.statut)}</td>
      <td>
        ${k.statut === 'active'
          ? `<button class="btn btn-danger btn-sm" onclick="revoquerCle(${k.id})"><i class="ti ti-ban"></i> Révoquer</button>`
          : `<span style="color:var(--text-muted);font-size:12px">–</span>`}
      </td>
    </tr>`).join('');
}

function filterKeys(statut) {
  const filtered = statut ? DATA.cles_api.filter(k => k.statut === statut) : DATA.cles_api;
  document.getElementById('keysBody').innerHTML = renderKeysRows(filtered);
}

function revoquerCle(id) {
  openModal(`
    <div class="modal-header">
      <div class="modal-title">Révoquer la clé</div>
      <button class="btn-icon" onclick="closeModal()"><i class="ti ti-x"></i></button>
    </div>
    <p style="color:var(--text-muted);margin-bottom:20px">Êtes-vous sûr de vouloir révoquer cette clé ? L'utilisateur ne pourra plus l'utiliser.</p>
    <div style="display:flex;gap:10px;justify-content:flex-end">
      <button class="btn btn-outline" onclick="closeModal()">Annuler</button>
      <button class="btn btn-danger" onclick="confirmerRevocation(${id})"><i class="ti ti-ban"></i> Révoquer</button>
    </div>`);
}

function confirmerRevocation(id) {
  const k = DATA.cles_api.find(k => k.id === id);
  if (k) { k.statut = 'revoquee'; }
  closeModal();
  showToast('Clé révoquée avec succès', 'warning');
  renderKeys();
}

// ══════════════════════════════════════════════
//  SECTION : LOGS
// ══════════════════════════════════════════════
function renderLogs() {
  document.getElementById('pageContent').innerHTML = `
    <div class="card">
      <div class="card-header">
        <div class="card-title">Logs de consommation (${DATA.logs.length})</div>
        <select class="form-control" style="width:auto" onchange="filterLogs(this.value)">
          <option value="">Tous</option>
          <option value="reussi">Réussi</option>
          <option value="echoue">Échoué</option>
        </select>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr><th>#</th><th>Utilisateur</th><th>Service</th><th>Date</th><th>Durée (s)</th><th>Statut</th></tr>
          </thead>
          <tbody id="logsBody">${renderLogsRows(DATA.logs)}</tbody>
        </table>
      </div>
    </div>`;
}

function renderLogsRows(logs) {
  return logs.map(l => {
    const cle  = DATA.cles_api.find(k => k.id === l.cle_id);
    const user = cle ? getUserName(cle.utilisateur_id) : '–';
    return `
      <tr>
        <td style="color:var(--text-muted)">#${l.id}</td>
        <td>${user}</td>
        <td><span class="badge badge-dev">${l.service}</span></td>
        <td style="color:var(--text-muted)">${l.dateAppel}</td>
        <td>${l.tempsExecution}s</td>
        <td>${badgeStatut(l.statut)}</td>
      </tr>`;
  }).join('');
}

function filterLogs(statut) {
  const filtered = statut ? DATA.logs.filter(l => l.statut === statut) : DATA.logs;
  document.getElementById('logsBody').innerHTML = renderLogsRows(filtered);
}

// ══════════════════════════════════════════════
//  SECTION : FACTURATION
// ══════════════════════════════════════════════
function renderBilling() {
  const total = DATA.facturation.reduce((s,f) => s + f.montantTotal, 0).toFixed(2);
  document.getElementById('pageContent').innerHTML = `
    <div class="stats-grid" style="grid-template-columns:repeat(3,1fr);margin-bottom:24px">
      <div class="stat-card">
        <div class="stat-icon amber"><i class="ti ti-receipt"></i></div>
        <div class="stat-info">
          <div class="stat-value">${total} €</div>
          <div class="stat-label">Total à facturer</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon purple"><i class="ti ti-clock"></i></div>
        <div class="stat-info">
          <div class="stat-value">${DATA.facturation.filter(f=>f.statut==='en_attente').length}</div>
          <div class="stat-label">Factures en attente</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon green"><i class="ti ti-check"></i></div>
        <div class="stat-info">
          <div class="stat-value">${DATA.facturation.filter(f=>f.statut==='payee').length}</div>
          <div class="stat-label">Factures payées</div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-header">
        <div class="card-title">Factures du mois</div>
        <button class="btn btn-primary btn-sm" onclick="genererFactures()"><i class="ti ti-plus"></i> Générer factures</button>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr><th>Utilisateur</th><th>Période</th><th>Requêtes</th><th>Montant</th><th>Statut</th><th>Actions</th></tr>
          </thead>
          <tbody>
            ${DATA.facturation.map(f => `
              <tr>
                <td>
                  <div style="font-weight:600">${getUserName(f.utilisateur_id)}</div>
                  <div style="font-size:11px;color:var(--text-muted)">${getUserById(f.utilisateur_id)?.email||''}</div>
                </td>
                <td style="color:var(--text-muted)">${f.dateDebut} → ${f.dateFin}</td>
                <td style="font-weight:600">${f.nombreRequetes}</td>
                <td style="font-weight:700;color:var(--accent)">${f.montantTotal} €</td>
                <td>${badgeStatut(f.statut)}</td>
                <td>
                  ${f.statut === 'en_attente'
                    ? `<button class="btn btn-success btn-sm" onclick="marquerPayee(${f.id})"><i class="ti ti-check"></i> Marquer payée</button>`
                    : `<span style="color:var(--text-muted)">–</span>`}
                </td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>
    </div>`;
}

function marquerPayee(id) {
  const f = DATA.facturation.find(f => f.id === id);
  if (f) f.statut = 'payee';
  showToast('Facture marquée comme payée', 'success');
  renderBilling();
}

function genererFactures() {
  showToast('Factures générées pour tous les utilisateurs actifs', 'success');
}

// ══════════════════════════════════════════════
//  SECTION : DEMANDES
// ══════════════════════════════════════════════
function renderRequests() {
  const pending = DATA.demandes.filter(d => d.statut === 'en_attente').length;
  document.getElementById('pageContent').innerHTML = `
    <div class="card">
      <div class="card-header">
        <div>
          <div class="card-title">Demandes de services API</div>
          <div class="card-subtitle">${pending} demande(s) en attente de traitement</div>
        </div>
      </div>
      <div id="demandesList">
        ${renderDemandesCards()}
      </div>
    </div>`;
}

function renderDemandesCards() {
  if (!DATA.demandes.length) return '<div class="empty-state"><i class="ti ti-inbox"></i><p>Aucune demande</p></div>';
  return DATA.demandes.map(d => `
    <div style="background:var(--bg-page);border-radius:var(--radius-sm);padding:18px;margin-bottom:14px;border:1px solid var(--border)">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px">
        <div style="display:flex;align-items:center;gap:12px">
          <div class="avatar">${getUserName(d.utilisateur_id)[0]}</div>
          <div>
            <div style="font-weight:600">${getUserName(d.utilisateur_id)}</div>
            <div style="font-size:11px;color:var(--text-muted)">${d.dateDemande}</div>
          </div>
        </div>
        <div style="display:flex;gap:8px;align-items:center">
          <span class="badge badge-dev">${d.service}</span>
          ${badgeStatut(d.statut)}
        </div>
      </div>
      <p style="font-size:13px;color:var(--text-muted);margin-bottom:14px;padding:10px;background:var(--bg-card);border-radius:var(--radius-sm)">${d.justification}</p>
      ${d.statut === 'en_attente' ? `
        <div style="display:flex;gap:10px">
          <button class="btn btn-success btn-sm" onclick="traiterDemande(${d.id},'approuver')"><i class="ti ti-check"></i> Approuver</button>
          <button class="btn btn-danger btn-sm"  onclick="traiterDemande(${d.id},'rejeter')"><i class="ti ti-x"></i> Rejeter</button>
        </div>` : `<span style="color:var(--text-muted);font-size:12px">Demande déjà traitée</span>`}
    </div>`).join('');
}

function traiterDemande(id, action) {
  const d = DATA.demandes.find(d => d.id === id);
  if (!d) return;
  if (action === 'approuver') {
    d.statut = 'approuvee';
    const newKey = {
      id: DATA.cles_api.length + 1,
      utilisateur_id: d.utilisateur_id,
      valeurCle: 'sk_new_' + Math.random().toString(36).substring(2, 18),
      quotaMax: 200,
      nombreAppelsUtilises: 0,
      statut: 'active',
      service: d.service
    };
    DATA.cles_api.push(newKey);
    showToast('Demande approuvée – clé générée automatiquement', 'success');
  } else {
    d.statut = 'rejetee';
    showToast('Demande rejetée', 'warning');
  }
  document.getElementById('badgeDemandes').textContent = DATA.demandes.filter(d=>d.statut==='en_attente').length;
  if (document.getElementById('demandesList')) {
    document.getElementById('demandesList').innerHTML = renderDemandesCards();
  } else {
    renderOverview();
  }
  closeModal();
}

// ══════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════
function logout() {
  if (confirm('Voulez-vous vraiment vous déconnecter ?')) {
    showToast('Déconnexion...', 'warning');
    setTimeout(() => window.location.href = 'login.html', 1500);
  }
}

// Initialisation
document.getElementById('badgeDemandes').textContent = DATA.demandes.filter(d=>d.statut==='en_attente').length;
renderOverview();
</script>
</body>
</html>
